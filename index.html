<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenShop</title>
    
    <link rel="stylesheet" href="normalize.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="reset.css">
</head>
<body>

    <div class="container">

        <header>

            <div class="logo">
                GREENSHOP
            </div>

            <nav class="menu">
                <a href="#" class="active">Home</a>
                <a href="#">Shop</a>
                <a href="#">Plant Care</a>
                <a href="#">Blogs</a>
            </nav>

            <button class="login-btn">
                Login
            </button>

        </header>

        <section class="hero">

            <div class="hero-text">

                <div class="small-title">
                    WELCOME TO GREENSHOP
                </div>

                <h1>
                    LET’S MAKE A <br>
                    BETTER PLANET
                </h1>

                <p>
                    <span>We are an online plant shop offering a wide range</span>
                    <span>of cheap and trendy plants. Use our plants to create</span>
                    <span>an unique Urban Jungle.</span>
                </p>

                <button class="shop-btn">
                    SHOP NOW
                </button>

            </div>

            <div class="hero-image">

                <img src="https://pngimg.com/d/plant_PNG27.png" alt="plant">

            </div>

        </section>

    </div>

</body>
</html>
